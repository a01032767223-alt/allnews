<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F1B2E">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0F1B2E;
    --bg-panel:#16233A;
    --bg-card:#1B2A44;
    --bg-card-hover:#20304E;
    --text-primary:#EDEEF2;
    --text-muted:#8B96A8;
    --text-faint:#5C6B82;
    --divider:#263349;
    --accent-teal:#3FA796;
    --accent-gold:#E8A33D;
    --accent-coral:#E4572E;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg-deep);
    color:var(--text-primary);
    font-family:-apple-system, BlinkMacSystemFont, "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom:48px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  /* ---------- Masthead ---------- */
  .masthead{
    padding:22px 20px 18px;
    background:linear-gradient(180deg, #101d33 0%, var(--bg-deep) 100%);
    border-bottom:1px solid var(--divider);
  }
  .masthead-row{
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .logotype{
    font-family:"Noto Serif KR", serif;
    font-weight:900;
    font-size:21px;
    letter-spacing:-0.5px;
    background:linear-gradient(90deg, var(--accent-teal), var(--accent-gold) 55%, var(--accent-coral));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .datestamp{
    font-family:"JetBrains Mono", monospace;
    font-size:12px;
    color:var(--text-muted);
    text-align:right;
    line-height:1.5;
  }
  .datestamp b{ color:var(--text-primary); font-weight:600; }

  /* signature gauge */
  .gauge-wrap{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .gauge-svg{ flex:0 0 auto; }
  .gauge-copy{ flex:1; min-width:0; }
  .gauge-label{
    font-size:11px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:4px;
  }
  .gauge-headline{
    font-size:14px;
    color:var(--text-primary);
    line-height:1.4;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
  }
  #needle{ transform-origin:60px 60px; transition:transform 0.9s cubic-bezier(.4,1.4,.4,1); }

  /* ---------- Tabs ---------- */
  .tabbar{
    display:flex;
    gap:8px;
    padding:14px 20px 0;
    position:sticky;
    top:0;
    background:var(--bg-deep);
    z-index:5;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    border-radius:10px 10px 0 0;
    font-size:14px;
    font-weight:600;
    color:var(--text-muted);
    background:transparent;
    border:none;
    border-bottom:2px solid transparent;
    cursor:pointer;
  }
  .tab.active{ color:var(--text-primary); }
  .tab[data-tab="domestic"].active{ border-bottom-color:var(--accent-teal); }
  .tab[data-tab="intl"].active{ border-bottom-color:var(--accent-coral); }

  .toolbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px 0;
    font-size:12px;
    color:var(--text-faint);
  }
  .toggle{
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
    user-select:none;
  }
  .toggle input{ accent-color:var(--accent-gold); }
  .refresh-btn{
    background:none; border:1px solid var(--divider); color:var(--text-muted);
    border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer;
  }
  .refresh-btn:active{ background:var(--bg-panel); }

  /* ---------- List ---------- */
  .list{ padding:14px 16px 8px; }
  .card{
    display:flex;
    gap:12px;
    padding:14px 12px;
    margin-bottom:8px;
    background:var(--bg-card);
    border-radius:12px;
    border:1px solid var(--divider);
    text-decoration:none;
    color:inherit;
  }
  .card:active{ background:var(--bg-card-hover); }

    font-family:"JetBrains Mono", monospace;
    font-size:13px;
    font-weight:700;
    color:var(--text-faint);
    width:22px;
    flex-shrink:0;

  }
  .card:nth-child(1) .rank, .card:nth-child(2) .rank, .card:nth-child(3) .rank{
    color:var(--accent-gold);
  }
  .card-body{ flex:1; min-width:0; }
  .card-title{
    font-size:15px;
    font-weight:600;
    line-height:1.45;
    color:var(--text-primary);
    margin-bottom:6px;
  }
  .card-meta{
    font-size:11.5px;
    color:var(--text-muted);
    margin-bottom:8px;
  }
  .card-meta-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
  }
  .card-meta-row .card-meta{ margin-bottom:0; flex:1; min-width:0; }
  .translate-btn{
    flex-shrink:0;
    font-size:11px;
    color:var(--accent-gold);
    background:rgba(232,163,61,0.12);
    border:1px solid rgba(232,163,61,0.35);
    border-radius:20px;
    padding:4px 10px;
    cursor:pointer;
  }
  .translate-btn:active{ background:rgba(232,163,61,0.22); }
  .card-original{
    font-size:12px;
    color:var(--text-faint);
    line-height:1.4;
    margin-bottom:8px;
    font-style:italic;
  }
  .score-bar{
    height:4px;
    border-radius:2px;
    background:var(--divider);
    overflow:hidden;
  }
  .score-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent-teal), var(--accent-gold), var(--accent-coral));
    background-size:220% 100%;
  }

  .state{
    padding:40px 24px;
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    line-height:1.6;
  }
  .state b{ color:var(--text-primary); display:block; margin-bottom:6px; font-size:14px; }
  .spinner{
    width:22px; height:22px; margin:0 auto 14px;
    border-radius:50%;
    border:2px solid var(--divider);
    border-top-color:var(--accent-gold);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--text-faint);
    padding:18px 20px 0;

  .hidden{ display:none !important; }
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(6,10,18,0.72);
    z-index:50;
    display:flex;

  .modal-panel{
    background:var(--bg-panel);

    display:flex;
    align-items:center;

    top:0;

    background:none;
    border:1px solid var(--divider);

    font-family:"Noto Serif KR", serif;
    font-weight:700;
    font-size:18px;
    line-height:1.5;
    margin-bottom:16px;
    color:var(--text-primary);
  }
  .modal-body p{
    font-size:14.5px;
    line-height:1.85;

    font-size:12.5px;

    font-style:italic;
    margin-bottom:16px;

</style>

<div class="masthead">
  <div class="masthead-row">

  <div class="gauge-wrap">
    <svg class="gauge-svg" width="60" height="46" viewBox="0 0 120 92">

<script>
/* ---------------- Config ---------------- */
const FEEDS = {
  domestic: [
    { name:'연합뉴스', url:'https://www.yna.co.kr/rss/news.xml' },
    { name:'한겨레', url:'http://www.hani.co.kr/rss/' },
    { name:'경향신문', url:'http://www.khan.co.kr/rss/rssdata/total_news.xml' },
    { name:'조선일보', url:'http://www.chosun.com/site/data/rss/rss.xml' },
    { name:'동아일보', url:'http://rss.donga.com/total.xml' }
  ],
  intl: [
    { name:'BBC World', url:'http://feeds.bbci.co.uk/news/world/rss.xml' },
    { name:'NYT World', url:'https://rss.nytimes.com/services/xml/rss/nyt/World.xml' },
    { name:'The Guardian', url:'https://www.theguardian.com/world/rss' },
    { name:'Al Jazeera', url:'https://www.aljazeera.com/xml/rss/all.xml' },
    { name:'NPR World', url:'https://feeds.npr.org/1004/rss.xml' }
  ]
};

const INTEREST_KEYWORDS = {
  domestic: ['교육','특수교육','시각장애','장애인','맹학교','기독교','교회','신앙','예배','목회',
             '투자','증시','코스피','코스닥','나스닥','금리','환율','비트코인','이더리움','암호화폐','가상자산'],
  intl: ['education','disability','disabilities','blind','visually impaired','church','faith','christian',
         'investment','stock market','nasdaq','s&p','bitcoin','ethereum','crypto','interest rate','federal reserve','fed ']
};

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
const RSS2JSON_API_KEY = '2v0cwdedibrbnog3phzpfexyzehe3nkryy3jnmkk'; // rss2json.com 발급 키 적용 완료
const CACHE_KEY_PREFIX = 'dawnbriefing_cache_';
const TRANSLATION_CACHE_KEY = 'dawnbriefing_translations';
const STALE_MS = 5 * 60 * 1000; // 5분 이내 캐시는 재수집 없이 그대로 사용
const TOP_N = 30;

const translationCache = new Map();
try{
  const rawT = localStorage.getItem(TRANSLATION_CACHE_KEY);
  if (rawT){
    const obj = JSON.parse(rawT);
    Object.keys(obj).forEach(k => translationCache.set(k, obj[k]));
  }
}catch(e){}

function persistTranslationCache(){
  try{
    const entries = Array.from(translationCache.entries()).slice(-500);
    const obj = {};
    entries.forEach(([k, v]) => { obj[k] = v; });
    localStorage.setItem(TRANSLATION_CACHE_KEY, JSON.stringify(obj));
  }catch(e){}
}

async function translateToKorean(text){
  if (!text) return text;
  if (translationCache.has(text)) return translationCache.get(text);
  try{
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    const translated = (data[0] || []).map(seg => seg[0]).join('');
    const result = translated || text;
    translationCache.set(text, result);
    return result;
  }catch(e){
    console.warn('translation failed:', e.message || e);
    translationCache.set(text, text);
    return text;
  }
}

async function translateItems(items, concurrency = 6){
  const queue = items.slice();
  const workers = new Array(Math.min(concurrency, queue.length)).fill(null).map(async () => {
    while (queue.length){
      const it = queue.shift();
      it.translatedTitle = await translateToKorean(it.title);
    }
  });
  await Promise.all(workers);
  persistTranslationCache();
}

function chunkText(text, maxLen = 1800){
  const paras = text.split('\n').filter(Boolean);
  const chunks = [];
  let cur = '';
  for (const p of paras){
    if (cur && (cur.length + p.length + 1) > maxLen){
      chunks.push(cur);
      cur = p;
    }else{
      cur = cur ? cur + '\n' + p : p;
    }
  }
  if (cur) chunks.push(cur);
  return chunks;
}

async function translateLongText(text){
  const chunks = chunkText(text);
  const translated = [];
  for (const chunk of chunks){
    translated.push(await translateToKorean(chunk));
  }
  return translated.join('\n\n');
}

async function fetchArticleTextViaProxy(url, proxyUrl){
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error('article proxy http=' + res.status);
  const html = await res.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style,nav,footer,aside,header,noscript').forEach(n => n.remove());
  let paras = Array.from(doc.querySelectorAll('article p'));
  if (paras.length < 3) paras = Array.from(doc.querySelectorAll('p'));
  const text = paras.map(p => p.textContent.replace(/\s+/g, ' ').trim())
    .filter(t => t.length > 40)
    .slice(0, 25)
    .join('\n');
  if (!text) throw new Error('no article paragraphs extracted');
  return text;
}

async function fetchArticleText(url){
  const proxies = [
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?url=' + encodeURIComponent(url)
  ];
  let lastErr;
  for (const proxyUrl of proxies){
    try{
      return await fetchArticleTextViaProxy(url, proxyUrl);
    }catch(e){
      lastErr = e;
      console.warn('article fetch failed via', proxyUrl, e.message || e);
    }
  }
  throw lastErr || new Error('all article proxies failed');
}

let state = { domestic: null, intl: null };
let currentTab = 'domestic';

/* ---------------- Utilities ---------------- */
function stripHtml(html){
  const t = document.createElement('div');
  t.innerHTML = html || '';
  return (t.textContent || t.innerText || '').trim();
}

function timeAgo(dateStr){
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diffMin = Math.round((Date.now() - d.getTime()) / 60000);
  if (diffMin < 1) return '방금 전';
  if (diffMin < 60) return diffMin + '분 전';
  const diffHr = Math.round(diffMin / 60);
  if (diffHr < 24) return diffHr + '시간 전';
  return Math.round(diffHr / 24) + '일 전';
}

function koBigrams(str){
  const s = (str || '').replace(/[^\p{L}\p{N}]/gu, '');
  const grams = new Set();
  for (let i = 0; i < s.length - 1; i++) grams.add(s.slice(i, i + 2));
  return grams;
}

const STOPWORDS = new Set(['the','a','an','of','to','in','on','for','and','is','are','at','by','with','as','after','over','amid','says','say']);
function enTokens(str){
  const words = (str || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length > 2 && !STOPWORDS.has(w));
  return new Set(words);
}

function jaccard(a, b){
  if (a.size === 0 || b.size === 0) return 0;
  let inter = 0;
  for (const x of a) if (b.has(x)) inter++;
  const union = a.size + b.size - inter;
  return union === 0 ? 0 : inter / union;
}

/* ---------------- Fetch ---------------- */
async function fetchViaRss2Json(feed){
  let url = RSS2JSON + encodeURIComponent(feed.url) + '&count=25';
  if (RSS2JSON_API_KEY) url += '&api_key=' + encodeURIComponent(RSS2JSON_API_KEY);
  const res = await fetch(url);
  const data = await res.json().catch(() => ({}));
  if (data.status !== 'ok' || !Array.isArray(data.items) || !data.items.length){
    throw new Error('rss2json http=' + res.status + ' msg=' + (data.message || 'no items'));
  }
  return data.items.map(it => ({
    title: stripHtml(it.title),
    link: it.link,
    source: feed.name,
    pubDate: it.pubDate,
    description: stripHtml(it.description).slice(0, 160)
  }));
}

async function fetchViaXmlProxy(feed, proxyUrl){
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error('proxy http=' + res.status);
  const text = await res.text();
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('XML parse error');
  const nodes = Array.from(doc.querySelectorAll('item'));
  if (!nodes.length) throw new Error('no items in feed XML');
  return nodes.slice(0, 25).map(node => ({
    title: stripHtml(node.querySelector('title')?.textContent || ''),
    link: (node.querySelector('link')?.textContent || '').trim(),
    source: feed.name,
    pubDate: node.querySelector('pubDate')?.textContent || '',
    description: stripHtml(node.querySelector('description')?.textContent || '').slice(0, 160)
  }));
}

async function fetchFeed(feed){
  const attempts = [
    { label: 'rss2json', run: () => fetchViaRss2Json(feed) },
    { label: 'allorigins', run: () => fetchViaXmlProxy(feed, 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feed.url)) },
    { label: 'corsproxy.io', run: () => fetchViaXmlProxy(feed, 'https://corsproxy.io/?url=' + encodeURIComponent(feed.url)) }
  ];
  for (const attempt of attempts){
    try{
      return await attempt.run();
    }catch(e){
      console.warn('[' + feed.name + '] ' + attempt.label + ' failed:', e.message || e);
    }
  }
  console.error('[' + feed.name + '] all routes failed');
  return [];
}

async function loadTab(tab){
  const results = await Promise.all(FEEDS[tab].map(fetchFeed));
  const items = results.flat().filter(it => it.title);
  if (items.length === 0) return null;
  try{ localStorage.setItem(CACHE_KEY_PREFIX + tab, JSON.stringify({ items, ts: Date.now() })); }catch(e){}
  return items;
}

function loadCache(tab){
  try{
    const raw = localStorage.getItem(CACHE_KEY_PREFIX + tab);
    if (!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

/* ---------------- Scoring ---------------- */
function scoreItems(items, tab, useWeights){
  const isKo = tab === 'domestic';
  const simFn = isKo ? koBigrams : enTokens;
  const threshold = isKo ? 0.32 : 0.28;
  const sigs = items.map(it => simFn(it.title));

  // union-find style clustering
  const clusterOf = new Array(items.length).fill(-1);
  const clusters = [];
  for (let i = 0; i < items.length; i++){
    if (clusterOf[i] !== -1) continue;
    const members = [i];
    clusterOf[i] = clusters.length;
    for (let j = i + 1; j < items.length; j++){
      if (clusterOf[j] !== -1) continue;
      if (jaccard(sigs[i], sigs[j]) >= threshold){
        clusterOf[j] = clusterOf[i];
        members.push(j);
      }
    }
    clusters.push(members);
  }

  const keywords = INTEREST_KEYWORDS[tab];
  const now = Date.now();

  const scored = items.map((it, idx) => {
    const cluster = clusters[clusterOf[idx]];
    const sourceCount = new Set(cluster.map(m => items[m].source)).size;
    const clusterScore = Math.min(sourceCount / FEEDS[tab].length, 1);

    let kwHits = 0;
    const hay = (it.title + ' ' + it.description).toLowerCase();
    for (const kw of keywords){ if (hay.includes(kw.toLowerCase())) kwHits++; }
    const kwScore = Math.min(kwHits / 3, 1);

    const d = new Date(it.pubDate);
    const ageHr = isNaN(d) ? 12 : Math.max(0, (now - d.getTime()) / 3600000);
    const recencyScore = Math.max(0, 1 - ageHr / 24);

    const weighted = useWeights
      ? clusterScore * 0.55 + kwScore * 0.30 + recencyScore * 0.15
      : clusterScore * 0.75 + recencyScore * 0.25;

    return { ...it, score: weighted, sourceCount };
  });

  // one entry per cluster: keep whichever member scored highest
  const finalList = clusters.map(members => {
    return members.reduce((best, m) => (scored[m].score > best.score ? scored[m] : best), scored[members[0]]);
  });

  finalList.sort((a, b) => b.score - a.score);
  return finalList;
}

/* ---------------- Render ---------------- */
function renderState(html){
  document.getElementById('list').innerHTML = '<div class="state">' + html + '</div>';
}

function renderList(ranked, tab){
  const listEl = document.getElementById('list');
  if (!ranked.length){
    renderState('<b>표시할 기사가 없습니다</b>잠시 후 새로고침을 눌러 다시 시도해 주세요.');
    return;
  }
  listEl.innerHTML = ranked.map((it, i) => {
    const pct = Math.round(it.score * 100);
    const rank = String(i + 1).padStart(2, '0');
    const multi = it.sourceCount > 1 ? it.sourceCount + '개 매체 공통 · ' : '';
    const displayTitle = (tab === 'intl' && it.translatedTitle) ? it.translatedTitle : it.title;
    const originalLine = (tab === 'intl' && it.translatedTitle && it.translatedTitle !== it.title)
      ? '<div class="card-original">' + escapeHtml(it.title) + '</div>'
      : '';
    const metaRow = (tab === 'intl')
      ? '<div class="card-meta-row">' +
          '<div class="card-meta">' + escapeHtml(it.source) + ' · ' + multi + timeAgo(it.pubDate) + '</div>' +
          '<button class="translate-btn" data-idx="' + i + '">번역으로 보기</button>' +
        '</div>'
      : '<div class="card-meta">' + escapeHtml(it.source) + ' · ' + multi + timeAgo(it.pubDate) + '</div>';
    const inner =
      '<div class="rank">' + rank + '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + escapeHtml(displayTitle) + '</div>' +
        originalLine +
        metaRow +
        '<div class="score-bar"><div class="score-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';

    // Both tabs: clicking the card opens the original article directly.
    // Intl cards additionally carry a small "번역으로 보기" button that opens
    // the in-app translated reader instead, without leaving the page.
    return '<a class="card" href="' + it.link + '" target="_blank" rel="noopener">' + inner + '</a>';
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function updateGauge(topDomestic, topIntl){
  const combined = [...(topDomestic || []).slice(0, 5), ...(topIntl || []).slice(0, 5)];
  if (!combined.length) return;
  const avg = combined.reduce((s, it) => s + it.score, 0) / combined.length;
  const top = combined.reduce((a, b) => (b.score > a.score ? b : a));

  const dash = 207;
  const offset = dash * (1 - avg);
  document.getElementById('gauge-fill').setAttribute('stroke-dashoffset', offset.toFixed(1));

  const angle = -90 + avg * 180; // -90(low) to +90(high) across the semicircle
  document.getElementById('needle').setAttribute('transform', 'rotate(' + angle.toFixed(1) + ' 60 78)');

  document.getElementById('gauge-headline').textContent = top.translatedTitle || top.title;
  document.getElementById('gauge-label').textContent = '오늘의 최상위 이슈 · 지수 ' + Math.round(avg * 100);
}

/* ---------------- Controller ---------------- */
async function refresh(tab, { forceNetwork = true, silent = false } = {}){
  if (currentTab === tab && !silent){
    renderState('<div class="spinner"></div><b>' + (tab === 'domestic' ? '국내' : '국외') + ' 뉴스를 모으는 중입니다</b>여러 매체의 기사를 비교해 중요도를 계산하고 있어요.');
  }

  let items = null;
  if (forceNetwork) items = await loadTab(tab);
  if (!items){
    const cached = loadCache(tab);
    if (cached) items = cached.items;
  }
  if (!items){
    if (currentTab === tab && !silent) renderState('<b>뉴스를 불러오지 못했습니다</b>모든 매체 연결이 실패했어요. 브라우저 개발자도구 콘솔(F12)에서 빨간색 에러 메시지를 확인하시거나, 잠시 후 새로고침을 눌러 주세요.');
    return;
  }

  const useWeights = document.getElementById('weightToggle').checked;
  const rankedFull = scoreItems(items, tab, useWeights);
  const ranked = rankedFull.slice(0, TOP_N);

  if (tab === 'intl'){
    if (currentTab === tab && !silent){
      renderState('<div class="spinner"></div><b>번역하는 중입니다</b>국외 기사 제목을 한글로 옮기고 있어요.');
    }
    await translateItems(ranked);
  }

  state[tab] = ranked;

  if (currentTab === tab) renderList(ranked, tab);
  updateGauge(state.domestic, state.intl);

  const now = new Date();
  document.getElementById('lastUpdated').textContent = '마지막 업데이트 ' + now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
}

// Cache-first startup: show whatever we already have instantly (this is what makes
// returning to the app - e.g. via a mobile back button - feel instant instead of
// re-collecting every feed from scratch). Only hits the network if the cache is
// missing or older than STALE_MS, and does so quietly in the background.
async function initTab(tab){
  const cached = loadCache(tab);
  if (cached && Array.isArray(cached.items) && cached.items.length){
    const useWeights = document.getElementById('weightToggle').checked;
    const ranked = scoreItems(cached.items, tab, useWeights).slice(0, TOP_N);
    if (tab === 'intl'){
      // reuse persisted translations where possible; anything missing falls back
      // to the original title instantly rather than blocking on network calls
      ranked.forEach(it => { it.translatedTitle = translationCache.get(it.title) || null; });
    }
    state[tab] = ranked;
    if (currentTab === tab) renderList(ranked, tab);
    updateGauge(state.domestic, state.intl);

    const age = Date.now() - (cached.ts || 0);
    if (age < STALE_MS) return; // fresh enough — skip refetch entirely
    refresh(tab, { forceNetwork: true, silent: true });
  }else{
    refresh(tab, { forceNetwork: true, silent: false });
  }
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (state[tab]) renderList(state[tab], tab);
  else refresh(tab);
}

function setDatestamp(){
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const dateStr = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');
  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('datestamp').innerHTML = dateStr + '(' + days[now.getDay()] + ') <b>' + timeStr + '</b>';
}

/* ---------------- Article reader modal ---------------- */
async function openArticleModal(item){
  const modal = document.getElementById('articleModal');
  const body = document.getElementById('modalBody');
  const originalLink = document.getElementById('modalOriginal');
  originalLink.href = item.link;
  modal.classList.remove('hidden');
  body.innerHTML = '<div class="state"><div class="spinner"></div><b>기사를 번역하는 중입니다</b>원문을 가져와 한글로 옮기고 있어요.</div>';

  const titleKo = item.translatedTitle || await translateToKorean(item.title);
  let bodyKo = '';
  let note = '';

  try{
    const rawText = await fetchArticleText(item.link);
    bodyKo = await translateLongText(rawText);
  }catch(e){
    console.warn('full article translate failed, falling back to summary:', e.message || e);
    try{
      bodyKo = item.description ? await translateToKorean(item.description) : '';
      note = '<p class="modal-note">전체 기사를 불러오지 못해 요약만 번역했습니다. "원문 보기"에서 전체 내용을 확인하세요.</p>';
    }catch(e2){
      note = '<p class="modal-note">번역에 실패했습니다. "원문 보기"에서 원문을 확인해 주세요.</p>';
    }
  }

  const paragraphsHtml = bodyKo.split('\n').filter(Boolean).map(p => '<p>' + escapeHtml(p) + '</p>').join('');
  body.innerHTML = '<div class="modal-title">' + escapeHtml(titleKo) + '</div>' + note + (paragraphsHtml || '');
}

function closeArticleModal(){
  document.getElementById('articleModal').classList.add('hidden');
}

document.getElementById('list').addEventListener('click', (e) => {
  const btn = e.target.closest('.translate-btn');
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const item = state.intl && state.intl[Number(btn.dataset.idx)];
  if (item) openArticleModal(item);
});
document.getElementById('modalClose').addEventListener('click', closeArticleModal);
document.getElementById('articleModal').addEventListener('click', (e) => {
  if (e.target.id === 'articleModal') closeArticleModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeArticleModal();
});

/* ---------------- Init ---------------- */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
document.getElementById('refreshBtn').addEventListener('click', () => refresh(currentTab));
document.getElementById('weightToggle').addEventListener('change', async () => {
  if (state[currentTab]){
    const useWeights = document.getElementById('weightToggle').checked;
    const cached = loadCache(currentTab);
    if (cached){
      const ranked = scoreItems(cached.items, currentTab, useWeights).slice(0, TOP_N);
      if (currentTab === 'intl') await translateItems(ranked);
      state[currentTab] = ranked;
      renderList(ranked, currentTab);
      updateGauge(state.domestic, state.intl);
    }
  }
});

setDatestamp();
setInterval(setDatestamp, 60000);
initTab('domestic');
initTab('intl');

if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed', e));
  });
}
</script>
